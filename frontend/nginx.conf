server {
    listen 80;
    server_name _;

    # الفرونت إند نفسه (React SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # مهم للـ SPA: أي مسار مش ملف حقيقي يرجع لـ index.html
        # (عندنا مفيش React Router دلوقتي بس ده احتياط سليم)
        try_files $uri /index.html;
    }

    # كل حاجة تحت /api بتتحول للباك إند
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ===== الجزء الأهم: دعم الـ SSE streaming =====
        # لو سبنا الـ buffering شغال، Nginx هيجمع كل التوكينز
        # ويبعتهم دفعة واحدة بعد ما الرد يخلص - يعني هتضيع خاصية
        # الـ streaming بالكامل واللي هيوصلك هو الرسالة كاملة فجأة
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;    # مهلة أطول لأن توليد الرد ممكن ياخد وقت
        chunked_transfer_encoding off;
    }

    # الـ endpoints الداخلية (health, model status, metrics)
    location /internal/ {
        proxy_pass http://backend:8000/internal/;
        proxy_buffering off;
        proxy_set_header Host $host;
    }
}
